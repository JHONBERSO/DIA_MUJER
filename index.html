<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti mi amor</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family: 'Dancing Script', cursive;
text-align:center;
color:white;
}

.contenedor{
background:rgba(0,0,0,0.35);
padding:50px;
border-radius:25px;
max-width:750px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
font-size:55px;
margin-bottom:25px;
}

#mensaje{
font-size:38px;
line-height:1.6;
min-height:200px;
}

.boton{
display:inline-block;
margin-top:40px;
padding:18px 40px;
background:white;
color:#ff4d6d;
text-decoration:none;
font-weight:bold;
border-radius:40px;
font-size:22px;
transition:0.3s;
}

.boton:hover{
background:#ffe3e6;
}

</style>
</head>

<body>

<div class="contenedor">

<h1>Para ti mi amor ❤️</h1>

<p id="mensaje"></p>

<a class="boton" href="https://drive.google.com/file/d/1UaMzhIXH5DT0lhqVvv7X-V5iDrGWRIcc/view?usp=drive_link" target="_blank">
🎬 Ver mi sorpresa
</a>

</div>

<script>

const texto = "Porque apareciste en el momento menos indicado para cambiar el rumbo de mi destino, justo cuando menos lo esperaba. Y aun así, tu llegada transformó todo en algo especial, llenando mis días de alegría, calma y sentimientos que no sabía que podía sentir.\n\nYadira, hoy quiero recordarte lo especial que eres y lo mucho que vales.\n\nPara ti, mi amor, feliz Día de la Mujer. 🌹✨";

let i = 0;

function escribir(){
if(i < texto.length){
document.getElementById("mensaje").innerHTML += texto.charAt(i) === "\n" ? "<br>" : texto.charAt(i);
i++;
setTimeout(escribir,40);
}
}

escribir();

</script>

</body>
</html>
